<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalize Reservation | Drift Deck</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0;
        }
        
        .checkout-wrapper { 
            max-width: 1000px; 
            margin: 60px auto; 
            display: grid; 
            grid-template-columns: 1.2fr 1fr; 
            gap: 40px; 
            padding: 20px; 
        }

        /* Summary Card (Left) */
        .car-card { 
            background: #111; 
            padding: 40px; 
            border-radius: 24px; 
            border: 1px solid #222; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .preview-img { 
            width: 100%; 
            border-radius: 12px; 
            margin: 25px 0; 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        /* Form Card (Right) */
        .form-card { 
            background: #ffffff; 
            color: #000; 
            padding: 40px; 
            border-radius: 24px; 
            display: flex;
            flex-direction: column;
        }

        .form-card h2 { margin-top: 0; font-size: 1.8rem; letter-spacing: -1px; }

        .input-group { margin-bottom: 15px; }
        
        input { 
            width: 100%; 
            padding: 14px; 
            margin-top: 8px;
            border: 1px solid #ddd; 
            border-radius: 10px; 
            box-sizing: border-box;
            font-size: 1rem;
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 0.75rem;
            margin-top: 5px;
            font-weight: 600;
            display: none;
        }

        .confirm-btn { 
            width: 100%; 
            padding: 18px; 
            background: #000; 
            color: #fff; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 20px; 
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .confirm-btn:hover { background: #333; transform: translateY(-2px); }

        /* Success Overlay */
        #success-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .success-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 60px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 500px;
            width: 90%;
        }

        .success-icon { font-size: 5rem; color: #00ff00; margin-bottom: 20px; }

        .home-btn {
            margin-top: 30px;
            padding: 15px 40px;
            background: #fff;
            color: #000;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            display: inline-block;
            transition: 0.3s;
        }

        .home-btn:hover { transform: scale(1.05); }

        @media (max-width: 768px) {
            .checkout-wrapper { grid-template-columns: 1fr; margin: 20px auto; }
        }
    </style>
</head>
<body>

<div class="checkout-wrapper">
    <div class="car-card" id="car-summary">
        </div>

    <div class="form-card">
        <h2>Driver Details</h2>
        <p style="font-size: 0.9rem; opacity: 0.6; margin-bottom: 25px;">Provide your credentials to finalize the acquisition.</p>
        
        <div class="input-group">
            <input type="text" id="full-name" placeholder="Full Legal Name">
            <div id="name-error" class="error-msg">Name must be at least 3 characters.</div>
        </div>

        <div class="input-group">
            <input type="email" id="user-email" placeholder="Email Address">
            <div id="email-error" class="error-msg">Please enter a valid email address.</div>
        </div>

        <div class="input-group">
            <input type="tel" id="user-phone" placeholder="Phone Number (10 Digits)">
            <div id="phone-error" class="error-msg">Enter a valid 10-digit mobile number.</div>
        </div>

        <button class="confirm-btn" onclick="completeBooking()">CONFIRM RESERVATION</button>
    </div>
</div>

<div id="success-overlay">
    <div class="success-card">
        <div class="success-icon">✓</div>
        <h1 style="letter-spacing: 5px; margin-bottom: 10px;">SECURED</h1>
        <p id="success-message" style="opacity: 0.8; line-height: 1.8; font-size: 1.1rem;"></p>
        <a href="cpp.html" class="home-btn">RETURN TO SHOWROOM</a>
    </div>
</div>

<script>
    // 1. Load the car from LocalStorage
    function loadSelection() {
        const car = JSON.parse(localStorage.getItem('pendingReservation'));
        const display = document.getElementById('car-summary');

        if (!car) {
            display.innerHTML = `
                <h2 style="color: #ff4d4d;">No asset selected.</h2>
                <p>Please browse the showroom first.</p>
                <a href="cpp.html" style="color:#fff; text-decoration: underline;">Back to Deck</a>
            `;
            return;
        }

        display.innerHTML = `
            <h1 style="letter-spacing:3px; font-size: 0.9rem; opacity: 0.5; margin: 0;">RESERVATION SUMMARY</h1>
            <img src="${car.img}" class="preview-img">
            <h2 style="font-size: 3rem; margin: 10px 0; letter-spacing: -1px;">${car.name}</h2>
            <div style="display:flex; justify-content:space-between; border-top: 1px solid #333; padding-top: 25px; margin-top: 20px;">
                <span style="opacity: 0.6;">Valuation:</span>
                <span style="font-weight:bold; font-size: 1.4rem; color: #fff;">${car.fullPrice}</span>
            </div>
            <p style="color: #00ff00; font-size: 0.9rem; margin-top: 15px; font-weight: 600;">✓ Priority Allocation Guaranteed</p>
        `;
    }

    // 2. Regex Validation Logic
    function validateInputs(name, email, phone) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const phoneRegex = /^[0-9]{10}$/;
        let isAllValid = true;

        // Reset Errors
        document.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none');

        if (name.length < 3) {
            document.getElementById('name-error').style.display = 'block';
            isAllValid = false;
        }
        if (!emailRegex.test(email)) {
            document.getElementById('email-error').style.display = 'block';
            isAllValid = false;
        }
        if (!phoneRegex.test(phone)) {
            document.getElementById('phone-error').style.display = 'block';
            isAllValid = false;
        }

        return isAllValid;
    }

    // 3. Complete the Process
    function completeBooking() {
        const name = document.getElementById('full-name').value;
        const email = document.getElementById('user-email').value;
        const phone = document.getElementById('user-phone').value;
        const carData = JSON.parse(localStorage.getItem('pendingReservation'));

        // Check validation
        if (!validateInputs(name, email, phone)) return;

        if (!carData) {
            alert("Reservation data lost. Please restart.");
            return;
        }

        // Save to Garage (bookedCars)
        let bookedCars = JSON.parse(localStorage.getItem('bookedCars')) || [];
        const bookingID = "DD-" + Math.floor(Math.random() * 899999 + 100000);
        
        const finalData = {
            ...carData,
            clientName: name,
            clientEmail: email,
            clientPhone: phone,
            bookingID: bookingID,
            timestamp: new Date().toLocaleString()
        };

        bookedCars.push(finalData);
        localStorage.setItem('bookedCars', JSON.stringify(bookedCars));

        // Show Success
        const successMsg = `
            Congratulations, <b>${name.toUpperCase()}</b>.<br>
            Your <b>${carData.name}</b> has been successfully added to your garage.<br>
            <span style="color: #00ff00; font-size: 0.8rem;">REF: ${bookingID}</span><br><br>
            Our logistics team will contact you at <b>${phone}</b> for delivery details.
        `;
        document.getElementById('success-message').innerHTML = successMsg;
        document.getElementById('success-overlay').style.display = 'flex';

        // Clear only the pending item, keep the garage
        localStorage.removeItem('pendingReservation');
    }

    window.onload = loadSelection;
</script>

</body>
</html>
