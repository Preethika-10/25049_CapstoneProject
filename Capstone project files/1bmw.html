<!DOCTYPE html> 

<html lang="en"> 

<head> 

    <meta charset="UTF-8"> 

    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 

    <title>Drift Deck | BMW</title> 

    <link rel="stylesheet" href="style.css"> 
    
    <style>
    :root { 
        --accent: #0066ad; /* BMW Blue */
        --m-red: #ff0000;
        --m-light-blue: #00a2e2;
    } 
    
    body {
        background: radial-gradient(circle at top left, #050a14, #000);
    }

    /* THE COOL PART: Slanted racing shape */
    .car-option.active {
        background: var(--accent);
        color: #fff;
        clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
        padding-left: 30px;
        font-weight: 800;
        border-left: 10px solid var(--m-red); /* M-Series Red accent */
        box-shadow: 10px 0 20px rgba(0, 102, 173, 0.4);
    }

    .details-area {
        background: transparent;
        border: none;
        outline: none;
    }

    /* Give the price a digital 'HUD' look */
    .full-price-tag {
        font-family: 'Courier New', monospace;
        color: var(--m-light-blue);
        letter-spacing: 2px;
        border-bottom: 2px solid var(--accent);
    }

    .reserve-btn {
        background: linear-gradient(90deg, var(--m-light-blue), var(--accent));
        border: none;
        clip-path: polygon(0 0, 85% 0, 100% 100%, 0% 100%);
    }
 </style>
<link rel="stylesheet" href="mobileview.css">
<script src="testdrive.js"></script>
</head> 

<body> 

 
 

<header> 

    <nav class="nav-links">

    <nav class="nav-right"> 

        <a href="#" class="nav-item">garage (0)</a>

</header> 

 
 

<main class="dashboard"> 
<div id="mobile-image-wrapper">

</div>

<section class="preview-pane"> 
    <img id="car-img" src="" alt="BMW"> 
</section>
 
 

    <section class="sidebar"> 

        <div id="list"></div> 

        <div id="details" class="details-area"></div> 

    </section> 

</main>

    function renderList() { 
// This creates the mobile container automatically if it doesn't exist
if (!document.getElementById('mobile-image-wrapper')) {
    const wrapper = document.createElement('div');
    wrapper.id = 'mobile-image-wrapper';
    wrapper.innerHTML = `<img id="mobile-car-img" src="">`;
    // Insert it before the dashboard or preview-pane
    const dash = document.querySelector('.dashboard') || document.querySelector('.main-display');
    dash.parentNode.insertBefore(wrapper, dash);
}
        document.getElementById('list').innerHTML = fleet.map((car, i) => ` 

            <div class="car-option"  

                 onmouseenter="updateView(${i}, this)"  

                 onclick="updateView(${i}, this)"> 

                ${car.name} 

            </div> 

        `).join(''); 

    } 
function updateView(index, el) { 
    currentSelection = index;
    document.querySelectorAll('.car-option').forEach(opt => opt.classList.remove('active')); 
    if(el) el.classList.add('active'); 

    const car = fleet[index]; 
    
    // Update the Laptop Image
    document.getElementById('car-img').src = car.img; 
    
    // Update the Mobile Image
    const mobImg = document.getElementById('mobile-car-img');
    if(mobImg) mobImg.src = car.img;
document.getElementById('details').innerHTML = `
        <h2 class="car-main-title">${car.name}</h2>
        <div class="price-section">
            <span class="full-price-tag">${car.fullPrice}</span>
            <span class="monthly-tag">${car.monthly}</span>
        </div>
        <div class="action-buttons">
            <button class="reserve-btn" onclick="reserveCar()">Book Now</button>
            <button class="test-drive-btn" onclick="scheduleTestDrive()">Test Drive</button>
        </div>
        <div class="spec-grid">
            <div class="spec-item">
                <p class="spec-label">Peak Power</p>
                <p class="spec-value">${car.power}</p>
            </div>
            <div class="spec-item">
                <p class="spec-label">Acceleration</p>
                <p class="spec-value">${car.acc}</p>
            </div>
            <div class="spec-item">
                <p class="spec-label">Est. Range</p>
                <p class="spec-value">${car.range}</p>
            </div>
            <div class="spec-item">
                <p class="spec-label">Drivetrain</p>
                <p class="spec-value">${car.drive}</p>
            </div>
            <div class="spec-item">
                <p class="spec-label">Top Speed</p>
                <p class="spec-value">M-Performance</p>
            </div>
            <div class="spec-item">
                <p class="spec-label">Warranty</p>
                <p class="spec-value">3yr / Unlimited</p> 
            </div>
        </div>
    `;
    // ... rest of your details code ...
}
 
 

function addTogarage() { 
        const car = fleet[currentSelection]; 
        let garage = JSON.parse(localStorage.getItem('driftDeckgarage')) || []; 
        garage.push(car); 
        localStorage.setItem('driftDeckgarage', JSON.stringify(garage)); 
        
        // Updates the "garage (X)" in your header
        updategarageCount(); 
        alert(`${car.name} has been added to your deck!`); 
    } 

    function scheduleTestDrive() {
    // Your luxury popup logic here
    const modal = document.getElementById('testDriveModal');
    if (modal) modal.style.display = 'flex';
}

    function updategarageCount() { 
        const garage = JSON.parse(localStorage.getItem('driftDeckgarage')) || []; 
        const garageDisplay = document.getElementById('garage-display'); 
        if(garageDisplay) { 
            garageDisplay.innerText = `garage (${garage.length})`; 
        } 
    }
    function reserveCar() {
    const selectedCar = fleet[currentSelection];
    // This saves the Porsche to the same place the Tesla page uses
    localStorage.setItem('pendingReservation', JSON.stringify(selectedCar));
    window.location.href = 'checkout.html';
}

    renderList(); 

    updateView(0, document.querySelector('.car-option')); 
// This ensures the car displays even if the initial load is slow
window.addEventListener('load', () => {
    renderList();
    // Force the first car to load after a tiny delay
    setTimeout(() => {
        updateView(0, document.querySelector('.car-option'));
    }, 100);
});
</script>
