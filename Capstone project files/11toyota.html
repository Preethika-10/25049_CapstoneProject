<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Drift Deck | Toyota</title> 
    <link rel="stylesheet" href="style.css"> 
    <style>
        :root { 
            --accent: #eb0a1e; /* Toyota Racing Red */
            --light-grey: #f4f4f4;
        } 
        
        /* Clean dark theme with a focus on the car */
        body {
            background: linear-gradient(180deg, #1a1a1a 0%, #000 100%);
            background-attachment: fixed;
        }

        .car-option.active {
            background: var(--accent);
            color: #fff;
            border-radius: 4px; /* Balanced, functional shape */
            font-weight: 700;
        }

        /* Consistent transparent details area as requested */
        .details-area {
            background: transparent;
            backdrop-filter: none;
            border: none;
            outline: none;
        }
    </style>
<link rel="stylesheet" href="mobileview.css">
<script src="testdrive.js"></script>
</head> 
<body> 

<header> 
    <nav class="nav-links"> 
        <a href="cpp.html" class="nav-item">Home</a> 
        <a href="#" class="nav-item">About</a> 
    </nav> 

    <div class="title-group"> 
                <h1 class="logo-main">Drift Deck</h1> 
        <div class="subtitle">Always Better Cars</div> 
    </div> 

    <nav class="nav-right"> 
        <a href="#" id="garage-display" class="nav-item">garage (0)</a> 
    </nav> 
</header> 

<main class="dashboard"> 
    <div id="mobile-image-wrapper">
    <img id="mobile-car-img" src="" alt="Mobile Car View">
</div>
    <section class="preview-pane"> 
        <img id="car-img" src="" alt="Toyota Showroom"> 
    </section> 

    <section class="sidebar"> 
        <div id="list"></div> 
        <div id="details" class="details-area"></div> 
    </section> 
</main> 

<script> 
    let currentSelection = 0;
const fleet = [ 
    {  
        name: "GR Supra",  
        fullPrice: "₹85,00,000",  
        monthly: "₹45,000/month",
        power: "382 hp",  
        acc: "3.9s",  
        range: "250 km/h", 
        drive: "Rear-Wheel Drive",
        img: "https://i.pinimg.com/736x/eb/84/6c/eb846cefcd6396a16fe3e3d32681177e.jpg"  
    }, 
    {  
        name: "Land Cruiser 300",  
        fullPrice: "₹2,10,00,000",  
        monthly: "₹95,000/month",
        power: "409 hp",  
        acc: "6.7s",  
        range: "210 km/h", 
        drive: "4WD with Lockers",
        img: "https://i.pinimg.com/736x/fe/55/13/fe551359b1029547f0cc8de557b9fffc.jpg"  
    }, 
    {  
        name: "Crown Sport",  
        fullPrice: "₹68,00,000",  
        monthly: "₹52,000/month",
        power: "302 hp",  
        acc: "5.8s",  
        range: "Hybrid Efficiency", 
        drive: "E-Four (AWD)",
        img: "https://i.pinimg.com/736x/d8/92/da/d892dae81ba67da594fb278f6e36b52d.jpg"  
    },
    {  
        name: "GR Corolla",  
        fullPrice: "₹45,00,000",  
        monthly: "₹38,000/month",
        power: "300 hp",  
        acc: "4.9s",  
        range: "230 km/h", 
        drive: "GR-FOUR AWD",
        img: "https://i.pinimg.com/736x/5d/93/d0/5d93d0d673bcfa712cd2e7b3f92fa611.jpg"  
    },
    {  
        name: "GR86",  
        fullPrice: "₹35,00,000",  
        monthly: "₹25,000/month",
        power: "228 hp",  
        acc: "6.1s",  
        range: "225 km/h", 
        drive: "Rear-Wheel Drive",
        img: "https://i.pinimg.com/736x/a8/b1/1a/a8b11a2b0da39e8d5b364421a3c65227.jpg"  
    }
];

    function renderList() { 
        document.getElementById('list').innerHTML = fleet.map((car, i) => ` 
            <div class="car-option" onmouseenter="updateView(${i}, this)" onclick="updateView(${i}, this)"> 
                ${car.name} 
            </div> 
        `).join(''); 
    } 

    function updateView(index, el) { 
    currentSelection = index;
    document.querySelectorAll('.car-option').forEach(opt => opt.classList.remove('active')); 
    if(el) el.classList.add('active'); 

    const car = fleet[index]; 
    document.getElementById('car-img').src = car.img; 

    document.getElementById('details').innerHTML = `
        <h2 class="car-main-title">${car.name}</h2>
        <div class="price-section">
            <span class="full-price-tag">${car.fullPrice}</span>
            <span class="monthly-tag">${car.monthly}</span>
        </div>
        <div class="action-buttons">
            <button class="reserve-btn" onclick="reserveCar()">Book Now</button>
            <button class="test-drive-btn" onclick="scheduleTestDrive()">Test Drive</button>
        </div>
        <div class="spec-grid">
            <div class="spec-item">
                <p class="spec-label">Peak Power</p>
                <p class="spec-value">${car.power}</p>
            </div>
            <div class="spec-item">
                <p class="spec-label">Acceleration</p>
                <p class="spec-value">${car.acc}</p>
            </div>
            <div class="spec-item">
                <p class="spec-label">Est. Range</p>
                <p class="spec-value">${car.range}</p>
            </div>
            <div class="spec-item">
                <p class="spec-label">Drivetrain</p>
                <p class="spec-value">${car.drive}</p>
            </div>
            <div class="spec-item">
                <p class="spec-label">Top Speed</p>
                <p class="spec-value">Standardized</p>
            </div>
            <div class="spec-item">
                <p class="spec-label">Warranty</p>
                <p class="spec-value">3yr / 100k km</p> 
            </div>
        </div>
    `;
}

    function addTogarage() { 
        const car = fleet[currentSelection]; 
        let garage = JSON.parse(localStorage.getItem('driftDeckgarage')) || []; 
        garage.push(car); 
        localStorage.setItem('driftDeckgarage', JSON.stringify(garage)); 
        updategarageCount(); 
        alert(`${car.name} added. Reliability comes standard.`); 
    } 
    function scheduleTestDrive() {
    // Your luxury popup logic here
    const modal = document.getElementById('testDriveModal');
    if (modal) modal.style.display = 'flex';
}
    function updategarageCount() { 
        const garage = JSON.parse(localStorage.getItem('driftDeckgarage')) || []; 
        const garageDisplay = document.getElementById('garage-display'); 
        if(garageDisplay) garageDisplay.innerText = `garage (${garage.length})`; 
    }
function reserveCar() {
    const selectedCar = fleet[currentSelection];
    // This saves the Porsche to the same place the Tesla page uses
    localStorage.setItem('pendingReservation', JSON.stringify(selectedCar));
    window.location.href = 'checkout.html';
}
    renderList(); 
    updateView(0, document.querySelector('.car-option')); 
    updategarageCount();
</script> 
<script src="imagelogic.js"></script>
</body> 
</html>
