<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Drift Deck | Bugatti</title> 
    <link rel="stylesheet" href="style.css"> 
    <style>
        :root { 
            --accent: #0026ff; /* Bugatti French Racing Blue */
            --carbon: #1a1a1a;
        } 
        
        /* Deep space background to make the blue pop */
        body {
            background: radial-gradient(circle at center, #000b1a, #000);
            background-attachment: fixed;
        }

        .car-option.active {
            background: var(--accent);
            color: #fff;
            /* Curved edge mimicking the Bugatti C-line */
            border-radius: 0 50px 50px 0; 
            padding-left: 25px;
            box-shadow: -10px 0 20px rgba(0, 38, 255, 0.3);
            font-weight: 800;
        }

        /* Fully transparent details as requested */
        .details-area {
            background: transparent;
            backdrop-filter: none;
            border: none;
            outline: none;
        }

        .reserve-btn {
            background: linear-gradient(45deg, var(--accent), #001380);
            border: none;
            border-radius: 50px; /* Smooth, aerodynamic look */
        }
    </style>
    <link rel="stylesheet" href="mobileview.css">
    <script src="testdrive.js"></script>
</head> 
<body> 

<header> 
    <nav class="nav-links"> 
        <a href="cpp.html" class="nav-item">Home</a> 
        <a href="#" class="nav-item">About</a> 
    </nav> 

    <div class="title-group"> 
                <h1 class="logo-main">Drift Deck</h1> 
        <div class="subtitle">Create the Incomparable</div> 
    </div> 

    <nav class="nav-right"> 
        <a href="#" id="garage-display" class="nav-item">garage (0)</a> 
    </nav> 
</header> 

<main class="dashboard"> 
    <section class="preview-pane"> 
        <img id="car-img" src="" alt="Bugatti Showroom"> 
    </section> 

    <section class="sidebar"> 
        <div id="list"></div> 
        <div id="details" class="details-area"></div> 
    </section> 
</main> 

<script> 
    let currentSelection = 0;
const fleet = [ 
    {  
        name: "Chiron Super Sport",  
        fullPrice: "₹28,50,00,000",  
        monthly: "₹15,50,000/month",
        power: "1578 hp",  
        acc: "2.3s",  
        range: "440 km/h", 
        drive: "Quad-Turbo AWD",
        img: "https://i.pinimg.com/1200x/15/ca/c9/15cac9b003ca21e48d65b14a1fde2b9e.jpg"  
    }, 
    {  
        name: "Tourbillon",  
        fullPrice: "₹32,00,00,000",  
        monthly: "₹25,00,000/month",
        power: "1800 hp",  
        acc: "2.0s",  
        range: "445 km/h", 
        drive: "V16 Hybrid AWD",
        img: "https://i.pinimg.com/1200x/fc/6c/a1/fc6ca113b4aed08d3e4f55e2dd81f068.jpg"  
    }, 
    {  
        name: "Mistral Roadster",  
        fullPrice: "₹40,00,00,000",  
        monthly: "₹22,00,000/month",
        power: "1578 hp",  
        acc: "2.4s",  
        range: "420 km/h", 
        drive: "Quad-Turbo AWD",
        img: "https://i.pinimg.com/736x/57/b5/af/57b5afd5d7f3d80073555207bf8bc253.jpg"  
    },
    {  
        name: "Bolide (Track Only)",  
        fullPrice: "₹35,00,00,000",  
        monthly: "₹18,00,000/month",
        power: "1825 hp",  
        acc: "2.1s",  
        range: "500 km/h+", 
        drive: "Quad-Turbo AWD",
        img: "https://images.unsplash.com/photo-1614200187524-dc4b892acf16?q=80&w=2000&auto=format&fit=crop"  
    }
];
    function renderList() { 
        document.getElementById('list').innerHTML = fleet.map((car, i) => ` 
            <div class="car-option" onmouseenter="updateView(${i}, this)" onclick="updateView(${i}, this)"> 
                ${car.name} 
            </div> 
        `).join(''); 
    } 

    function updateView(index, el) { 
    currentSelection = index;
    document.querySelectorAll('.car-option').forEach(opt => opt.classList.remove('active')); 
    if(el) el.classList.add('active'); 

    const car = fleet[index]; 
    document.getElementById('car-img').src = car.img; 

    document.getElementById('details').innerHTML = `
        <h2 class="car-main-title">${car.name}</h2>
        <div class="price-section">
            <span class="full-price-tag">${car.fullPrice}</span>
            <span class="monthly-tag">${car.monthly}</span>
        </div>
        <div class="action-buttons">
            <button class="reserve-btn" onclick="reserveCar()">Book Now</button>
            <button class="test-drive-btn" onclick="scheduleTestDrive()">Test Drive</button>
        </div>
        <div class="spec-grid">
            <div class="spec-item">
                <p class="spec-label">Peak Power</p>
                <p class="spec-value">${car.power}</p>
            </div>
            <div class="spec-item">
                <p class="spec-label">Acceleration</p>
                <p class="spec-value">${car.acc}</p>
            </div>
            <div class="spec-item">
                <p class="spec-label">Est. Range</p>
                <p class="spec-value">${car.range}</p>
            </div>
            <div class="spec-item">
                <p class="spec-label">Drivetrain</p>
                <p class="spec-value">${car.drive}</p>
            </div>
            <div class="spec-item">
                <p class="spec-label">Top Speed</p>
                <p class="spec-value">World Record</p>
            </div>
            <div class="spec-item">
                <p class="spec-label">Warranty</p>
                <p class="spec-value">4yr / Unlimited</p> 
            </div>
        </div>
    `;
}

    function addTogarage() { 
        const car = fleet[currentSelection]; 
        let garage = JSON.parse(localStorage.getItem('driftDeckgarage')) || []; 
        garage.push(car); 
        localStorage.setItem('driftDeckgarage', JSON.stringify(garage)); 
        updategarageCount(); 
        alert(`${car.name} selected. Welcome to the 1% club.`); 
    } 
    function scheduleTestDrive() {
    // Your luxury popup logic here
    const modal = document.getElementById('testDriveModal');
    if (modal) modal.style.display = 'flex';
}
    function updategarageCount() { 
        const garage = JSON.parse(localStorage.getItem('driftDeckgarage')) || []; 
        const garageDisplay = document.getElementById('garage-display'); 
        if(garageDisplay) garageDisplay.innerText = `garage (${garage.length})`; 
    }
function reserveCar() {
    const selectedCar = fleet[currentSelection];
    // This saves the Porsche to the same place the Tesla page uses
    localStorage.setItem('pendingReservation', JSON.stringify(selectedCar));
    window.location.href = 'checkout.html';
}
    renderList(); 
    updateView(0, document.querySelector('.car-option')); 
    updategarageCount();
</script>
<script src="imagelogic.js"></script> 
</body> 
</html>
